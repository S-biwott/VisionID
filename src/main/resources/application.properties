#Application
spring.application.name=OcrTesting

# Path to the Tesseract tessdata directory.
tesseract.datapath=C:/Program Files/Tesseract-OCR/tessdata

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.bytedeco=WARN
logging.level.com.example.OcrTesting=DEBUG